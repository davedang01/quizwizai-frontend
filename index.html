<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Wiz AI - Smart Study Made Easy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Instant loading screen — visible before React JS bundle loads -->
      <div id="preload-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(to bottom right,#f0f9ff,#ffffff,#ecfeff);gap:24px;font-family:Inter,system-ui,sans-serif;">
        <!-- QuizWiz AI Logo -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#0284C7 0%,#38BDF8 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px -5px rgba(2,132,199,0.3);">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
          </div>
          <div style="text-align:center;">
            <h1 style="font-size:28px;font-weight:700;color:#111827;margin:0 0 4px 0;">Quiz Wiz AI</h1>
            <p style="font-size:14px;color:#6B7280;margin:0;">Smart Study Made Easy</p>
          </div>
        </div>
        <!-- Loading indicator + server message -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#0284C7;border-radius:50%;animation:prespin 0.8s linear infinite;"></div>
          <p style="font-size:13px;font-weight:500;color:#374151;margin:0;">Starting up...</p>
          <p style="font-size:11px;color:#9CA3AF;margin:0;">(may take a moment on first visit)</p>
        </div>
      </div>
      <style>@keyframes prespin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
